<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neta — Check your inbox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            parchment:     '#F5F0E8',
            ink:           '#1C1C1C',
            sienna:        '#C4622D',
            taupe:         '#8C7B6B',
            'taupe-light': '#D6CEC4',
          },
          fontFamily: {
            serif: ['Playfair Display', 'Georgia', 'serif'],
            sans:  ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    body { background-color: #F5F0E8; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-anim { animation: fadeUp 0.4s ease 0.05s both; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-4 py-16">

  <!-- Wordmark -->
  <div class="mb-12 text-center">
    <h1 class="font-serif text-5xl text-ink tracking-tight">neta</h1>
    <p class="font-sans text-taupe text-sm mt-2 tracking-widest uppercase">The real signal.</p>
  </div>

  <!-- Card -->
  <div class="card-anim w-full max-w-md bg-white/60 backdrop-blur-sm rounded-2xl px-8 py-10 shadow-sm border border-taupe-light text-center">

    <!-- Envelope mark -->
    <div class="mx-auto mb-6 w-12 h-12 rounded-full bg-parchment border border-taupe-light flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-sienna" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
    </div>

    <h2 class="font-serif text-2xl text-ink">Check your inbox</h2>
    <p class="font-sans text-sm text-taupe mt-3 leading-relaxed">
      We sent a sign-in link to<br/>
      <span class="text-ink font-medium">hector@example.com</span>
    </p>

    <div class="mt-8 pt-6 border-t border-taupe-light">
      <p class="font-sans text-xs text-taupe leading-relaxed">
        The link works once and expires in 15 minutes.<br/>
        Wrong email? <a href="login.html" class="text-sienna hover:underline">Start over</a>
      </p>
    </div>

    <button class="mt-6 font-sans text-xs text-taupe border border-taupe-light rounded-lg px-4 py-2 hover:border-taupe transition-colors">
      Resend link
    </button>

  </div>

</body>
</html>
